<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In with Glean</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f9fafb;
            color: #374151;
        }
        .loading {
            text-align: center;
            padding: 24px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            text-align: center;
            padding: 24px;
            max-width: 400px;
        }
        .error h3 { color: #991b1b; margin: 0 0 8px; }
        .error p { color: #6b7280; font-size: 14px; margin: 0 0 16px; }
        .btn { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
            background: #3b82f6;
            color: #fff;
        }
        .btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="loading" id="loading-state">
        <div class="spinner"></div>
        <p>Redirecting to Glean sign-in...</p>
    </div>
    <div class="error" id="error-state" style="display: none;">
        <h3>Sign-in Error</h3>
        <p id="error-message">An error occurred during sign-in.</p>
        <button class="btn" onclick="window.close()">Close</button>
    </div>

    <!-- Glean config (needed by gleanOAuth -> settings dependency chain) -->
    <script src="../config/glean-defaults.js"></script>
    <script src="../config/api.js"></script>

    <script type="module">
        import { gleanOAuth } from '../services/gleanOAuth.js';
        
        async function startAuth() {
            try {
                const authUrl = await gleanOAuth.startAuthFlow();
                // Redirect to Glean's authorization page
                window.location.href = authUrl;
            } catch (error) {
                console.error('[OAUTH-DIALOG] Auth start error:', error);
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = error.message;
            }
        }
        
        startAuth();
    </script>
</body>
</html>
