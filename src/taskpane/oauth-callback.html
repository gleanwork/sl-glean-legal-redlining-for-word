<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completing Sign-In...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f9fafb;
            color: #374151;
        }
        .container { text-align: center; padding: 24px; max-width: 400px; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-icon {
            width: 48px; height: 48px; margin: 0 auto 16px;
            background: #d1fae5; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #10b981;
        }
        .error-icon {
            width: 48px; height: 48px; margin: 0 auto 16px;
            background: #fee2e2; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #ef4444;
        }
        h3 { margin: 0 0 8px; }
        p { color: #6b7280; font-size: 14px; margin: 0; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px; margin-top: 16px;
            background: #3b82f6; color: #fff;
        }
        .btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading-state">
            <div class="spinner"></div>
            <p>Completing sign-in...</p>
        </div>
        <div id="success-state" style="display: none;">
            <div class="success-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h3 style="color: #065f46;">Signed In</h3>
            <p>You can close this window.</p>
        </div>
        <div id="error-state" style="display: none;">
            <div class="error-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            </div>
            <h3 style="color: #991b1b;">Sign-In Failed</h3>
            <p id="error-message">An error occurred.</p>
            <button class="btn" onclick="window.close()">Close</button>
        </div>
    </div>

    <!-- Office.js needed for messageParent -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <!-- Glean config (needed by gleanOAuth -> settings dependency chain) -->
    <script src="../config/glean-defaults.js"></script>
    <script src="../config/api.js"></script>

    <script type="module">
        import { gleanOAuth } from '../services/gleanOAuth.js';
        
        function showError(message) {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }
        
        function showSuccess() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('success-state').style.display = 'block';
        }
        
        function sendMessageToParent(message) {
            try {
                // Office Dialog API messageParent
                if (typeof Office !== 'undefined' && Office.context && Office.context.ui) {
                    Office.context.ui.messageParent(JSON.stringify(message));
                }
            } catch (e) {
                console.warn('[CALLBACK] messageParent failed:', e);
            }
        }
        
        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const errorDescription = params.get('error_description');
            
            // Handle error from authorization server
            if (error) {
                const msg = errorDescription || error;
                console.error('[CALLBACK] Auth error:', msg);
                showError(msg);
                sendMessageToParent({ type: 'oauth-error', error: msg });
                return;
            }
            
            // Must have authorization code
            if (!code) {
                showError('No authorization code received.');
                sendMessageToParent({ type: 'oauth-error', error: 'No authorization code' });
                return;
            }
            
            try {
                // Exchange code for tokens
                const tokenData = await gleanOAuth.exchangeCode(code, state);
                
                console.log('[CALLBACK] Token exchange successful');
                showSuccess();
                
                // Notify parent window with tokens (needed because popup and iframe have separate localStorage)
                sendMessageToParent({
                    type: 'oauth-success',
                    email: gleanOAuth.getEmailFromToken(),
                    tokens: {
                        access_token: tokenData.access_token,
                        refresh_token: tokenData.refresh_token,
                        id_token: tokenData.id_token,
                        expires_in: tokenData.expires_in
                    }
                });
                
                // Auto-close after brief delay
                setTimeout(() => {
                    try { window.close(); } catch (e) { /* ignore */ }
                }, 1500);
                
            } catch (error) {
                console.error('[CALLBACK] Token exchange error:', error);
                showError(error.message);
                sendMessageToParent({ type: 'oauth-error', error: error.message });
            }
        }
        
        // Wait for Office to initialize if available, then handle callback
        if (typeof Office !== 'undefined') {
            Office.onReady(() => handleCallback());
        } else {
            handleCallback();
        }
    </script>
</body>
</html>
