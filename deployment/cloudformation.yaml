                  - dynamodb:UpdateItem
                Resource: !GetAtt ConfigTable.Arn

  DCRRegistrationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'glean-legal-dcr-register-${DeploymentId}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt DCRRegistrationRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          GLEAN_INSTANCE: !Ref GleanInstance
          CONFIG_TABLE: !Ref ConfigTable
          ALLOWED_REDIRECT_URI: !If
            - HasCustomDomain
            - !Sub 'https://${DomainName}/taskpane/oauth-callback.html'
            - 'https://localhost/taskpane/oauth-callback.html'
      Code:
        ZipFile: |
          import json
          import os
          import urllib3
          import boto3
          
          http = urllib3.PoolManager()
          dynamodb = boto3.resource('dynamodb')
          
          def lambda_handler(event, context):
              """
              DCR Registration Proxy.
              Checks DynamoDB for a cached DCR client_id.
              If none exists, registers a new public client with Glean's /oauth/register.
              Caches the result in DynamoDB for reuse.
              """
              headers_out = {
                  'Content-Type': 'application/json',
                  'Access-Control-Allow-Origin': '*',
                  'Access-Control-Allow-Headers': 'Content-Type',
                  'Access-Control-Allow-Methods': 'POST,OPTIONS'
              }
              
              if event.get('httpMethod') == 'OPTIONS':
                  return {'statusCode': 200, 'headers': headers_out, 'body': ''}
              
              if event.get('httpMethod') != 'POST':
                  return {'statusCode': 405, 'headers': headers_out, 'body': json.dumps({'error': 'Method not allowed'})}
              
              config_table = os.environ.get('CONFIG_TABLE', '')
              glean_instance = os.environ.get('GLEAN_INSTANCE', '')
              allowed_redirect_uri = os.environ.get('ALLOWED_REDIRECT_URI', '')
              
              if not glean_instance:
                  return {'statusCode': 500, 'headers': headers_out, 'body': json.dumps({'error': 'GLEAN_INSTANCE not configured'})}
              
              # Parse request body (optional — client can send client_name override)
              try:
                  body = json.loads(event.get('body', '{}')) if event.get('body') else {}
              except (json.JSONDecodeError, TypeError):
                  body = {}
              
              # Check DynamoDB for cached DCR client
              table = dynamodb.Table(config_table)
              try:
                  resp = table.get_item(Key={'PK': 'CONFIG', 'SK': 'dcr'})
                  item = resp.get('Item', {})
                  cached_client_id = item.get('clientId', '')
                  
                  if cached_client_id:
                      print(f'Returning cached DCR client_id: {cached_client_id[:20]}...')
                      return {
                          'statusCode': 200,
                          'headers': headers_out,
                          'body': json.dumps({
                              'client_id': cached_client_id,
                              'cached': True
                          })
                      }
              except Exception as e:
                  print(f'DynamoDB read error (non-fatal): {e}')
              
              # No cached client — register a new one with Glean
              register_url = f'https://{glean_instance}-be.glean.com/oauth/register'
              
              client_name = body.get('client_name', 'Glean Legal Word Add-in')
              registration_payload = {
                  'client_name': client_name,
                  'redirect_uris': [allowed_redirect_uri],
                  'grant_types': ['authorization_code', 'refresh_token'],
                  'response_types': ['code'],
                  'token_endpoint_auth_method': 'none'
              }
              
              print(f'Registering DCR client at {register_url}')
              print(f'Payload: {json.dumps(registration_payload)}')
              
              try:
                  reg_resp = http.request(
                      'POST',
                      register_url,
                      body=json.dumps(registration_payload),
                      headers={'Content-Type': 'application/json'}
                  )
                  
                  response_body = reg_resp.data.decode('utf-8')
                  print(f'Registration response status: {reg_resp.status}')
                  
                  if reg_resp.status >= 400:
                      print(f'Registration error: {response_body[:500]}')
                      return {
                          'statusCode': reg_resp.status,
                          'headers': headers_out,
                          'body': json.dumps({
                              'error': 'DCR registration failed',
                              'details': response_body[:500]
                          })
                      }
                  
                  reg_data = json.loads(response_body)
                  new_client_id = reg_data.get('client_id', '')
                  
                  if not new_client_id:
                      return {
                          'statusCode': 500,
                          'headers': headers_out,
                          'body': json.dumps({'error': 'No client_id in registration response'})
                      }
                  
                  # Cache in DynamoDB
                  try:
                      table.put_item(Item={
                          'PK': 'CONFIG',
                          'SK': 'dcr',
                          'clientId': new_client_id,
                          'clientName': client_name,
                          'redirectUri': allowed_redirect_uri,
                          'tokenEndpointAuthMethod': 'none'
                      })
                      print(f'Cached new DCR client_id in DynamoDB: {new_client_id[:20]}...')
                  except Exception as e:
                      print(f'DynamoDB cache write error (non-fatal): {e}')
                  
                  return {
                      'statusCode': 200,
                      'headers': headers_out,
                      'body': json.dumps({
                          'client_id': new_client_id,
                          'cached': False
                      })
                  }
                  
              except Exception as e:
                  print(f'DCR registration error: {e}')
                  return {
                      'statusCode': 502,
                      'headers': headers_out,
                      'body': json.dumps({'error': f'DCR registration failed: {str(e)}'})
                  }
      Tags:
        - Key: Name
          Value: !Sub 'glean-legal-dcr-register-${DeploymentId}'

  # ============================================================================
  # Lambda Function 1: Template/Playbook Lister
  # ============================================================================
  ListingLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'glean-legal-list-${DeploymentId}'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 600
      MemorySize: 256
      Environment:
        Variables:
          GLEAN_INSTANCE: !Ref GleanInstance
      Code:
        ZipFile: |
          // This Lambda uses Node.js + API Gateway Response Streaming with SSE framing.
          // SSE heartbeat comments keep the connection alive through corporate proxies.
          
          const CORS_HEADERS = {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'POST, OPTIONS',
              'Content-Type': 'text/event-stream',
              'Cache-Control': 'no-cache',
              'X-Accel-Buffering': 'no'
          };
          
          exports.handler = awslambda.streamifyResponse(async (event, responseStream, context) => {
              responseStream = awslambda.HttpResponseStream.from(responseStream, {
                  statusCode: 200,
                  headers: CORS_HEADERS
              });
              
              // Parse request body
              let body;
              try {
                  if (typeof event.body === 'string') {
                      body = JSON.parse(event.body);
                  } else {
                      body = event.body || {};
                  }
              } catch (e) {
                  responseStream.write(`data: ${JSON.stringify({ error: `Invalid JSON: ${e.message}` })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Handle OPTIONS preflight request
              if (event.httpMethod === 'OPTIONS') {
                  responseStream.write('');
                  responseStream.end();
                  return;
              }
              
              // Extract parameters
              const apiToken = body.apiToken;
              const authType = body.authType || 'token';
              const instance = body.instance || process.env.GLEAN_INSTANCE || '';
              const listingAgentId = body.listingAgentId;
              const listType = body.type || 'Both';
              
              // Validate required parameters
              if (!apiToken) {
                  responseStream.write(`data: ${JSON.stringify({ error: 'Missing required parameter: apiToken' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              if (!listingAgentId || listingAgentId === 'YOUR_LISTING_AGENT_ID') {
                  responseStream.write(`data: ${JSON.stringify({ error: 'Listing Agent ID not configured. Please set it in Settings.' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Build Glean API request
              const gleanUrl = `https://${instance}-be.glean.com/rest/api/v1/agents/runs/wait`;
              const gleanPayload = {
                  agent_id: listingAgentId,
                  input: {},
                  messages: [{
                      role: 'USER',
                      content: [{ text: listType, type: 'text' }]
                  }],
                  metadata: {}
              };
              
              // Heartbeat: send SSE comment every 15s to keep the connection alive through proxies
              const heartbeat = setInterval(() => {
                  try { responseStream.write(': heartbeat\n\n'); } catch (e) { /* stream may have closed */ }
              }, 15000);
              
              // Call Glean API
              try {
                  console.log(`Calling Glean API for list type: ${listType}`);
                  
                  const gleanHeaders = {
                      'Content-Type': 'application/json',
                      'Authorization': `Bearer ${apiToken}`
                  };
                  if (authType === 'oauth') gleanHeaders['X-Glean-Auth-Type'] = 'OAUTH';
                  
                  const gleanController = new AbortController();
                  const gleanTimeout = setTimeout(() => gleanController.abort(), 590000);
                  
                  let gleanResp;
                  try {
                      gleanResp = await fetch(gleanUrl, {
                          method: 'POST',
                          headers: gleanHeaders,
                          body: JSON.stringify(gleanPayload),
                          signal: gleanController.signal
                      });
                  } finally {
                      clearTimeout(gleanTimeout);
                  }
                  
                  console.log(`Glean API response status: ${gleanResp.status}`);
                  const responseBody = await gleanResp.text();
                  console.log(`Response body (first 500 chars): ${responseBody.substring(0, 500)}`);
                  
                  if (gleanResp.status >= 400) {
                      console.log(`Glean API error: ${responseBody}`);
                      clearInterval(heartbeat);
                      responseStream.write(`data: ${JSON.stringify({
                          error: `Glean API returned ${gleanResp.status}`,
                          details: responseBody.substring(0, 1000)
                      })}\n\n`);
                      responseStream.end();
                      return;
                  }
                  
                  // Parse response
                  const responseData = JSON.parse(responseBody);
                  console.log(`Response keys: ${Object.keys(responseData).join(', ')}`);
                  
                  // Extract content from agent response
                  const messages = responseData.messages || [];
                  console.log(`Number of messages: ${messages.length}`);
                  
                  if (messages.length > 0) {
                      const firstMessage = messages[0];
                      console.log(`First message role: ${firstMessage.role}`);
                      
                      const content = firstMessage.content || [];
                      console.log(`Content items: ${content.length}`);
                      
                      if (content.length > 0) {
                          let contentText = content[0].text || '';
                          console.log(`Content text length: ${contentText.length}`);
                          console.log(`Content text preview (first 200 chars): ${contentText.substring(0, 200)}`);
                          
                          // Strip markdown code fences if present
                          if (contentText.trim().startsWith('```')) {
                              console.log('Detected markdown code fence, stripping...');
                              const lines = contentText.trim().split('\n');
                              if (lines[0].startsWith('```')) lines.shift();
                              if (lines.length > 0 && lines[lines.length - 1].trim() === '```') lines.pop();
                              contentText = lines.join('\n');
                              console.log(`After stripping, length: ${contentText.length}, preview: ${contentText.substring(0, 200)}`);
                          }
                          
                          // Try to parse as JSON
                          if (contentText) {
                              try {
                                  const result = JSON.parse(contentText);
                                  console.log('Successfully parsed JSON result');
                                  clearInterval(heartbeat);
                                  responseStream.write(`data: ${JSON.stringify(result)}\n\n`);
                                  responseStream.end();
                                  return;
                              } catch (parseErr) {
                                  console.log(`JSON parse error: ${parseErr.message}`);
                                  console.log(`Content was: ${contentText}`);
                                  clearInterval(heartbeat);
                                  responseStream.write(`data: ${JSON.stringify({
                                      error: 'Agent response is not valid JSON',
                                      raw_response: contentText.substring(0, 500)
                                  })}\n\n`);
                                  responseStream.end();
                                  return;
                              }
                          } else {
                              console.log('Content text is empty');
                              clearInterval(heartbeat);
                              responseStream.write(`data: ${JSON.stringify({
                                  error: 'Agent returned empty response',
                                  full_response: JSON.stringify(responseData).substring(0, 1000)
                              })}\n\n`);
                              responseStream.end();
                              return;
                          }
                      } else {
                          console.log('No content in message');
                          clearInterval(heartbeat);
                          responseStream.write(`data: ${JSON.stringify({
                              error: 'No content in agent response',
                              message: JSON.stringify(firstMessage).substring(0, 500)
                          })}\n\n`);
                          responseStream.end();
                          return;
                      }
                  } else {
                      console.log('No messages in response');
                      clearInterval(heartbeat);
                      responseStream.write(`data: ${JSON.stringify({
                          error: 'No messages in agent response',
                          response_keys: Object.keys(responseData)
                      })}\n\n`);
                      responseStream.end();
                      return;
                  }
                  
              } catch (e) {
                  console.log(`Error calling Glean API: ${e.message}`);
                  console.log(`Stack: ${e.stack}`);
                  clearInterval(heartbeat);
                  responseStream.write(`data: ${JSON.stringify({ error: `Error calling Glean API: ${e.message}` })}\n\n`);
                  responseStream.end();
              }
          });
      Tags:
        - Key: Name
          Value: !Sub 'glean-legal-list-${DeploymentId}'


  # ============================================================================
  # Lambda Function 2: Contract Analysis/Redlining
  # ============================================================================
  AnalysisLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'glean-legal-analyze-${DeploymentId}'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          GLEAN_INSTANCE: !Ref GleanInstance
      Code:
        ZipFile: |
          // This Lambda uses Node.js + API Gateway Response Streaming to prevent 504 timeouts.
          // Node.js is required because Lambda response streaming (awslambda.streamifyResponse)
          // is only natively supported on Node.js managed runtimes.
          // The Lambda sends periodic heartbeat bytes while waiting for the Glean API,
          // keeping the API Gateway connection alive for up to 15 minutes.
          
          const CORS_HEADERS = {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'POST, OPTIONS',
              'Content-Type': 'text/event-stream',
              'Cache-Control': 'no-cache',
              'X-Accel-Buffering': 'no'
          };
          
          exports.handler = awslambda.streamifyResponse(async (event, responseStream, context) => {
              // Wrap the stream immediately with 200 metadata (matching AWS streaming examples).
              // All responses use HTTP 200 — errors are embedded in the JSON body with an 'error' key.
              // API Gateway response streaming does not reliably deliver bodies for non-200 status codes.
              responseStream = awslambda.HttpResponseStream.from(responseStream, {
                  statusCode: 200,
                  headers: CORS_HEADERS
              });
              
              // Parse request body
              let body;
              try {
                  if (typeof event.body === 'string') {
                      body = JSON.parse(event.body);
                  } else {
                      body = event.body || {};
                  }
              } catch (e) {
                  responseStream.write(`data: ${JSON.stringify({ error: `Invalid JSON: ${e.message}` })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Handle OPTIONS preflight request (normally handled by MOCK integration, but kept as safety)
              if (event.httpMethod === 'OPTIONS') {
                  responseStream.write('');
                  responseStream.end();
                  return;
              }
              
              // Extract parameters
              const apiToken = body.apiToken;
              const authType = body.authType || 'token';
              const instance = body.instance || process.env.GLEAN_INSTANCE || '';
              const redlinerAgentId = body.redlinerAgentId;
              const contractText = (body.contractText || '').trim();
              const selectedText = (body.selectedText || '').trim();
              const templateLink = (body.templateLink || '').trim();
              const customTemplateText = (body.customTemplateText || '').trim();
              const playbookLink = (body.playbookLink || '').trim();
              const customPlaybookText = (body.customPlaybookText || '').trim();
              const additionalInstructions = (body.additionalInstructions || '').trim();
              const changeWeight = body.changeWeight || 'Balanced';
              const includeAIReasoning = body.includeAIReasoning || 'Yes';
              
              // Validate API token
              if (!apiToken) {
                  responseStream.write(`data: ${JSON.stringify({ error: 'API token is required' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Validate redliner agent ID
              if (!redlinerAgentId) {
                  responseStream.write(`data: ${JSON.stringify({ error: 'Missing required parameter: redlinerAgentId' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Validate mutually exclusive content fields
              if (contractText && selectedText) {
                  responseStream.write(`data: ${JSON.stringify({ error: 'Cannot provide both contractText and selectedText. Please provide only one.' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              if (!contractText && !selectedText) {
                  responseStream.write(`data: ${JSON.stringify({ error: 'Either contractText or selectedText is required' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Detect agent type via schema endpoint
              const gleanBase = `https://${instance}-be.glean.com/rest/api/v1`;
              const gleanUrl = `${gleanBase}/agents/runs/wait`;
              const schemaUrl = `${gleanBase}/agents/${redlinerAgentId}/schemas`;
              
              let isAutoMode = false;
              try {
                  console.log(`Checking agent schema: ${schemaUrl}`);
                  const schemaController = new AbortController();
                  const schemaTimeout = setTimeout(() => schemaController.abort(), 10000);
                  try {
                      const schemaHeaders = {
                          'Content-Type': 'application/json',
                          'Authorization': `Bearer ${apiToken}`
                      };
                      if (authType === 'oauth') schemaHeaders['X-Glean-Auth-Type'] = 'OAUTH';
                      
                      const schemaResp = await fetch(schemaUrl, {
                          method: 'GET',
                          headers: schemaHeaders,
                          signal: schemaController.signal
                      });
                      if (schemaResp.ok) {
                          const schemaData = await schemaResp.json();
                          const inputSchema = schemaData.input_schema || {};
                          isAutoMode = Object.keys(inputSchema).length === 0;
                          console.log(`Agent type detected: ${isAutoMode ? 'Auto Mode' : 'Workflow'} (input_schema fields: ${Object.keys(inputSchema).length})`);
                      } else {
                          console.log(`Schema check returned ${schemaResp.status}, defaulting to Workflow mode`);
                      }
                  } finally {
                      clearTimeout(schemaTimeout);
                  }
              } catch (schemaErr) {
                  console.log(`Schema check failed (${schemaErr.message}), defaulting to Workflow mode`);
              }
              
              // Build Glean API payload based on agent type
              let gleanPayload;
              if (isAutoMode) {
                  // Auto Mode agent: send data as a structured user message
                  const contentText = contractText || selectedText;
                  const templateValue = customTemplateText || templateLink || 'N/A';
                  const playbookValue = customPlaybookText || playbookLink || 'N/A';
                  const instructionsValue = additionalInstructions || 'N/A';
                  
                  const messageText = `<<CONTRACT_TEXT>>\n${contentText}\n<</CONTRACT_TEXT>>\n\n<<TEMPLATE>>\n${templateValue}\n<</TEMPLATE>>\n\n<<PLAYBOOK>>\n${playbookValue}\n<</PLAYBOOK>>\n\n<<ADDITIONAL_INSTRUCTIONS>>\n${instructionsValue}\n<</ADDITIONAL_INSTRUCTIONS>>`;
                  
                  gleanPayload = {
                      agent_id: redlinerAgentId,
                      messages: [{
                          role: 'USER',
                          content: [{ text: messageText, type: 'text' }]
                      }]
                  };
              } else {
                  // Workflow agent: send data as named input fields
                  gleanPayload = {
                      agent_id: redlinerAgentId,
                      input: {
                          'Contract Text': contractText || '',
                          'Selected Text': selectedText || '',
                          'Template Link': templateLink || 'N/A',
                          'Custom Template Text or Link': customTemplateText || 'N/A',
                          'Playbook Link': playbookLink || 'N/A',
                          'Custom Playbook Text or Link': customPlaybookText || 'N/A',
                          'Additional Instructions': additionalInstructions || 'N/A',
                          'Change Weight': changeWeight,
                          'Include AI reasoning': includeAIReasoning
                      }
                  };
              }
              
              // Heartbeat: send SSE comment every 15s to keep the connection alive through proxies
              const heartbeat = setInterval(() => {
                  try { responseStream.write(': heartbeat\n\n'); } catch (e) { /* stream may have closed */ }
              }, 15000);
              
              // Call Glean API with timeout just under Lambda timeout for clean shutdown
              try {
                  console.log(`Calling Glean API: ${gleanUrl} (${isAutoMode ? 'Auto Mode' : 'Workflow'})`);
                  console.log(`Payload keys: ${Object.keys(gleanPayload).join(', ')}`);
                  
                  const gleanController = new AbortController();
                  const gleanTimeout = setTimeout(() => gleanController.abort(), 590000);
                  
                  let gleanResp;
                  try {
                      const gleanHeaders = {
                          'Content-Type': 'application/json',
                          'Authorization': `Bearer ${apiToken}`
                      };
                      if (authType === 'oauth') gleanHeaders['X-Glean-Auth-Type'] = 'OAUTH';
                      
                      gleanResp = await fetch(gleanUrl, {
                          method: 'POST',
                          headers: gleanHeaders,
                          body: JSON.stringify(gleanPayload),
                          signal: gleanController.signal
                      });
                  } finally {
                      clearTimeout(gleanTimeout);
                  }
                  
                  console.log(`Glean API response status: ${gleanResp.status}`);
                  const responseBody = await gleanResp.text();
                  console.log(`Response body (first 500 chars): ${responseBody.substring(0, 500)}`);
                  
                  if (gleanResp.status >= 400) {
                      console.log(`Glean API error: ${responseBody}`);
                      clearInterval(heartbeat);
                      responseStream.write(`data: ${JSON.stringify({
                          error: `Glean API returned ${gleanResp.status}`,
                          details: responseBody.substring(0, 1000)
                      })}\n\n`);
                      responseStream.end();
                      return;
                  }
                  
                  // Parse and pass through the entire Glean API response to the client
                  const responseData = JSON.parse(responseBody);
                  console.log(`Response data keys: ${Object.keys(responseData).join(', ')}`);
                  
                  clearInterval(heartbeat);
                  responseStream.write(`data: ${JSON.stringify(responseData)}\n\n`);
                  responseStream.end();
                  
              } catch (e) {
                  console.log(`Error calling Glean API: ${e.message}`);
                  console.log(`Stack: ${e.stack}`);
                  clearInterval(heartbeat);
                  responseStream.write(`data: ${JSON.stringify({ error: `Error calling Glean API: ${e.message}` })}\n\n`);
                  responseStream.end();
              }
          });
      Tags:
        - Key: Name
          Value: !Sub 'glean-legal-analyze-${DeploymentId}'


  # ============================================================================
  # Lambda Function 3: Chat Assistant
  # ============================================================================
  ChatLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'glean-legal-chat-${DeploymentId}'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 600
      MemorySize: 256
      Environment:
        Variables:
          GLEAN_INSTANCE: !Ref GleanInstance
      Code:
        ZipFile: |
          // This Lambda uses Node.js + API Gateway Response Streaming with SSE framing.
          // SSE heartbeat comments keep the connection alive through corporate proxies.
          
          const CORS_HEADERS = {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'POST, OPTIONS',
              'Content-Type': 'text/event-stream',
              'Cache-Control': 'no-cache',
              'X-Accel-Buffering': 'no'
          };
          
          exports.handler = awslambda.streamifyResponse(async (event, responseStream, context) => {
              responseStream = awslambda.HttpResponseStream.from(responseStream, {
                  statusCode: 200,
                  headers: CORS_HEADERS
              });
              
              // Parse request body
              let body;
              try {
                  if (typeof event.body === 'string') {
                      body = JSON.parse(event.body);
                  } else {
                      body = event.body || {};
                  }
              } catch (e) {
                  responseStream.write(`data: ${JSON.stringify({ error: `Invalid JSON: ${e.message}` })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Handle OPTIONS preflight request
              if (event.httpMethod === 'OPTIONS') {
                  responseStream.write('');
                  responseStream.end();
                  return;
              }
              
              // Extract parameters
              const apiToken = body.apiToken;
              const authType = body.authType || 'token';
              const instance = body.instance || process.env.GLEAN_INSTANCE || '';
              const message = body.message;
              const documentContent = body.documentContent || '';
              const chatId = body.chatId;
              
              // Validate required parameters
              if (!apiToken || !message) {
                  responseStream.write(`data: ${JSON.stringify({ error: 'Missing required parameters: apiToken, message' })}\n\n`);
                  responseStream.end();
                  return;
              }
              
              // Build Glean Chat API request
              const gleanUrl = `https://${instance}-be.glean.com/rest/api/v1/chat`;
              
              // Build message with document context
              let messageText;
              if (documentContent && documentContent.trim()) {
                  const prompt = "You're a professional legal contract reviewer responding to user chat messages. I'll provide you with the user's initial question, including the contract document body. After your initial answer users might ask follow-up questions - be sure to ground all answers to the contract document body provided in this initial message.";
                  messageText = `${prompt}\n\nUser's initial question: ${message}\n\n<<<DOCUMENT>>>\n${documentContent}\n<<<END_DOCUMENT>>>`;
              } else {
                  messageText = message;
              }
              
              const gleanPayload = {
                  messages: [{
                      author: 'USER',
                      fragments: [{
                          text: messageText
                      }]
                  }],
                  agent_id: '4fb936e772ca4b48ae59dbb424b36f18',
                  saveChat: true,
                  stream: false
              };
              
              // Add chatId if continuing conversation
              if (chatId) {
                  gleanPayload.chatId = chatId;
              }
              
              // Heartbeat: send SSE comment every 15s to keep the connection alive through proxies
              const heartbeat = setInterval(() => {
                  try { responseStream.write(': heartbeat\n\n'); } catch (e) { /* stream may have closed */ }
              }, 15000);
              
              // Call Glean Chat API
              try {
                  const gleanHeaders = {
                      'Content-Type': 'application/json',
                      'Authorization': `Bearer ${apiToken}`
                  };
                  if (authType === 'oauth') gleanHeaders['X-Glean-Auth-Type'] = 'OAUTH';
                  
                  const gleanController = new AbortController();
                  const gleanTimeout = setTimeout(() => gleanController.abort(), 590000);
                  
                  let gleanResp;
                  try {
                      gleanResp = await fetch(gleanUrl, {
                          method: 'POST',
                          headers: gleanHeaders,
                          body: JSON.stringify(gleanPayload),
                          signal: gleanController.signal
                      });
                  } finally {
                      clearTimeout(gleanTimeout);
                  }
                  
                  console.log(`Glean Chat API response status: ${gleanResp.status}`);
                  const responseBody = await gleanResp.text();
                  
                  if (gleanResp.status >= 400) {
                      console.log(`Glean Chat API error: ${responseBody.substring(0, 500)}`);
                      clearInterval(heartbeat);
                      responseStream.write(`data: ${JSON.stringify({
                          error: `Glean Chat API returned ${gleanResp.status}`,
                          details: responseBody.substring(0, 1000)
                      })}\n\n`);
                      responseStream.end();
                      return;
                  }
                  
                  // Parse response
                  const responseData = JSON.parse(responseBody);
                  
                  // Extract chat response
                  const chatIdResponse = responseData.chatId || chatId;
                  const messages = responseData.messages || [];
                  
                  // Get the assistant's reply (find the last GLEAN_AI message with text)
                  let replyText = '';
                  
                  // Filter for GLEAN_AI messages
                  const agentMessages = messages.filter(m => m.author === 'GLEAN_AI');
                  
                  if (agentMessages.length > 0) {
                      // Get the last message (usually the final answer)
                      const lastMsg = agentMessages[agentMessages.length - 1];
                      const fragments = lastMsg.fragments || [];
                      
                      // Join all text fragments
                      const texts = fragments.filter(f => f.text).map(f => f.text);
                      replyText = texts.join(' ');
                  }
                  
                  if (!replyText && messages.length > 0) {
                      // Fallback: try to get text from the very last message of any author
                      const lastMsg = messages[messages.length - 1];
                      const fragments = lastMsg.fragments || [];
                      const texts = fragments.filter(f => f.text).map(f => f.text);
                      replyText = texts.join(' ');
                  }
                  
                  const result = {
                      chatId: chatIdResponse,
                      message: replyText,
                      fullResponse: responseData
                  };
                  
                  clearInterval(heartbeat);
                  responseStream.write(`data: ${JSON.stringify(result)}\n\n`);
                  responseStream.end();
                  
              } catch (e) {
                  console.log(`Error calling Glean Chat API: ${e.message}`);
                  console.log(`Stack: ${e.stack}`);
                  clearInterval(heartbeat);
                  responseStream.write(`data: ${JSON.stringify({ error: `Error calling Glean Chat API: ${e.message}` })}\n\n`);
                  responseStream.end();
              }
          });
      Tags:
        - Key: Name
          Value: !Sub 'glean-legal-chat-${DeploymentId}'


